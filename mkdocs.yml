site_name: AuDesign Voice
site_description: A self-hosted, UAE-resident alternative to Azure's Voice Live API
site_url: https://saadmsft.github.io/audvoice-voice/
repo_url: https://github.com/saadmsft/audvoice-voice
repo_name: saadmsft/audvoice-voice
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/saadmsft/audvoice-voice

plugins:
  - search

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Wire protocol: protocol.md
  - LLM backends: llm-backends.md
  - Agent Framework integration: integration-agent-framework.md
  - SDKs: sdk.md
  - Deployment: deployment.md
  - Operations & residency: operations.md
