<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AuDesign Voice</title>
  <style>
    :root {
      --bg-0: #07080c;
      --fg: #e9ecf3;
      --muted: #6b7280;
      --accent: #7c5cff;
      --accent-2: #00d4ff;
      --user: #34d399;
      --agent: #f472b6;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%; margin: 0;
      background:
        radial-gradient(1200px 800px at 20% 10%, #131a2b 0%, transparent 60%),
        radial-gradient(900px 700px at 80% 90%, #1a1330 0%, transparent 55%),
        var(--bg-0);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: center; justify-items: center;
    }
    header {
      width: 100%; padding: 1.25rem 1.75rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .brand { font-weight: 600; letter-spacing: .02em; font-size: .95rem; opacity: .9; display: flex; align-items: center; gap: .55rem; }
    .brand .mark { height: 1.4rem; width: 1.4rem; object-fit: contain; filter: drop-shadow(0 0 8px rgba(124,92,255,.35)); }
    .brand .dot {
      display: inline-block; width: .55rem; height: .55rem; border-radius: 999px;
      background: var(--muted); margin-right: .55rem; vertical-align: middle;
      transition: background-color .25s ease, box-shadow .25s ease;
    }
    .brand.connected .dot { background: var(--user); box-shadow: 0 0 12px var(--user); }
    .brand.error .dot { background: var(--danger); box-shadow: 0 0 12px var(--danger); }
    .gear {
      background: transparent; color: var(--muted);
      border: 1px solid #1f2433;
      width: 2.25rem; height: 2.25rem; border-radius: 999px;
      cursor: pointer; display: grid; place-items: center;
      transition: color .2s, border-color .2s;
    }
    .gear:hover { color: var(--fg); border-color: #2f3550; }

    .stage {
      width: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2.5rem; user-select: none;
    }
    .orb-wrap { position: relative; width: 320px; height: 320px; display: grid; place-items: center; }
    .orb {
      position: absolute; inset: 0; border-radius: 999px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 45%),
        radial-gradient(circle at 70% 80%, var(--accent-2), transparent 60%),
        radial-gradient(circle at 50% 50%, var(--accent), #2a1a6e 70%);
      box-shadow: 0 0 80px rgba(124,92,255,.35), inset 0 0 60px rgba(0,212,255,.25);
      transition: transform .4s cubic-bezier(.2,.8,.2,1), box-shadow .4s ease, filter .4s ease;
      filter: saturate(.85) brightness(.9);
    }
    .ring {
      position: absolute; border-radius: 999px;
      border: 1.5px solid rgba(124,92,255,.35);
      pointer-events: none; opacity: 0; transform: scale(.9);
    }
    .ring.r1 { inset: -20px; }
    .ring.r2 { inset: -50px; border-color: rgba(0,212,255,.25); }
    .ring.r3 { inset: -90px; border-color: rgba(244,114,182,.18); }

    .stage[data-state="idle"] .orb { filter: saturate(.4) brightness(.55); transform: scale(.92); }

    .stage[data-state="listening"] .orb { filter: saturate(.95) brightness(1); animation: breathe 4s ease-in-out infinite; }
    .stage[data-state="listening"] .ring { animation: ripple 3.2s ease-out infinite; }
    .stage[data-state="listening"] .ring.r2 { animation-delay: .8s; }
    .stage[data-state="listening"] .ring.r3 { animation-delay: 1.6s; }

    .stage[data-state="user"] .orb {
      box-shadow: 0 0 100px rgba(52,211,153,.55), inset 0 0 60px rgba(52,211,153,.35);
      filter: saturate(1.1) brightness(1.1) hue-rotate(-60deg);
    }
    .stage[data-state="user"] .ring { animation: ripple 1.4s ease-out infinite; border-color: rgba(52,211,153,.45); }
    .stage[data-state="user"] .ring.r2 { animation-delay: .25s; }
    .stage[data-state="user"] .ring.r3 { animation-delay: .5s; }

    .stage[data-state="agent"] .orb {
      box-shadow: 0 0 120px rgba(244,114,182,.55), inset 0 0 60px rgba(244,114,182,.4);
      filter: saturate(1.2) brightness(1.15) hue-rotate(40deg);
      animation: pulse 1.1s ease-in-out infinite;
    }
    .stage[data-state="agent"] .ring { animation: ripple 1.8s ease-out infinite; border-color: rgba(244,114,182,.4); }
    .stage[data-state="agent"] .ring.r2 { animation-delay: .35s; }
    .stage[data-state="agent"] .ring.r3 { animation-delay: .7s; }

    .stage[data-state="error"] .orb { filter: saturate(1) brightness(.8) hue-rotate(180deg); }

    @keyframes breathe { 0%,100% { transform: scale(.95); } 50% { transform: scale(1.02); } }
    @keyframes pulse   { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes ripple  {
      0%   { opacity: .55; transform: scale(.92); }
      80%  { opacity: 0;   transform: scale(1.35); }
      100% { opacity: 0;   transform: scale(1.4); }
    }

    .caption {
      text-align: center; letter-spacing: .04em; text-transform: uppercase;
      font-size: .8rem; color: var(--muted); min-height: 1.2em;
    }
    .caption strong { color: var(--fg); font-weight: 500; letter-spacing: .02em; }

    .controls { display: flex; align-items: center; gap: .9rem; }
    .btn {
      appearance: none; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white; font-weight: 600; letter-spacing: .03em;
      padding: .9rem 2.2rem; border-radius: 999px;
      cursor: pointer; font-size: .95rem;
      box-shadow: 0 12px 30px rgba(124,92,255,.35);
      transition: transform .15s ease, box-shadow .2s ease, opacity .2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn.ghost {
      background: transparent; color: var(--muted);
      border: 1px solid #1f2433; box-shadow: none; font-weight: 500;
    }
    .btn.ghost:hover { color: var(--fg); border-color: #2f3550; }

    footer {
      width: 100%; padding: 1rem 1.75rem 1.5rem;
      display: flex; justify-content: space-between;
      color: var(--muted); font-size: .75rem; letter-spacing: .04em;
    }

    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(380px, 92vw);
      background: rgba(13,17,26,.95); backdrop-filter: blur(18px);
      border-left: 1px solid #1c2030;
      transform: translateX(110%);
      transition: transform .3s cubic-bezier(.2,.8,.2,1);
      padding: 1.5rem; z-index: 10; overflow: auto;
    }
    .drawer.open { transform: translateX(0); }
    .drawer h3 { margin: 0 0 1rem; font-weight: 600; font-size: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .drawer label { display: block; margin: 1rem 0 .35rem; font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .drawer input {
      width: 100%; padding: .65rem .8rem;
      background: #0a0d15; border: 1px solid #1f2433; color: var(--fg);
      border-radius: 8px; font-size: .9rem; font-family: ui-monospace, monospace;
    }
    .drawer input:focus { outline: none; border-color: var(--accent); }
    .drawer .close { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; }
    .drawer .close:hover { color: var(--fg); }

    .events-toggle { font-size: .7rem; color: var(--muted); cursor: pointer; user-select: none; }
    .events {
      display: none; margin: 0 1.75rem 1rem;
      max-height: 220px; overflow: auto;
      background: #06080d; border: 1px solid #161a26; border-radius: 8px;
      padding: .6rem .75rem;
      font-family: ui-monospace, monospace; font-size: .72rem; color: #9aa3b8;
      white-space: pre-wrap;
    }
    .events.open { display: block; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand" id="brand"><span class="dot"></span><img class="mark" src="./assets/mark.png" alt="" />AuDesign Voice</div>
      <button class="gear" id="gear" title="Settings" aria-label="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>

    <main class="stage" id="stage" data-state="idle">
      <div class="orb-wrap">
        <div class="ring r3"></div>
        <div class="ring r2"></div>
        <div class="ring r1"></div>
        <div class="orb"></div>
      </div>
      <div class="caption" id="caption">Tap <strong>Start</strong> to begin</div>
      <div class="controls">
        <button class="btn" id="start">Start</button>
        <button class="btn ghost" id="stop" disabled>End</button>
      </div>
    </main>

    <pre class="events" id="events"></pre>

    <footer>
      <div class="hint">Speak naturally — interrupt anytime</div>
      <div class="events-toggle" id="eventsToggle">debug</div>
    </footer>
  </div>

  <aside class="drawer" id="drawer">
    <h3>Settings <button class="close" id="drawerClose">×</button></h3>
    <label>Server</label>
    <input id="server" value="http://127.0.0.1:8088" />
    <label>API Key</label>
    <input id="apiKey" value="devkey" />
  </aside>

  <script type="module" src="./demo.js"></script>
</body>
</html>
